<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasli Transport Roat — CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0F4F8;min-height:100vh}
a{color:inherit;text-decoration:none}

/* Header */
.hdr{background:#1F3864;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr-left .title{color:#fff;font-size:17px;font-weight:700;letter-spacing:.3px}
.hdr-left .sub{color:#93B5D5;font-size:12px;margin-top:2px}
.tab-bar-outer{display:flex;gap:2px;background:rgba(255,255,255,.12);border-radius:8px;padding:3px}
.tab{padding:6px 16px;font-size:12px;font-weight:600;color:#93B5D5;cursor:pointer;border-radius:6px;border:none;background:none;transition:.15s}
.tab.on{background:#fff;color:#1F3864}
.tab:hover:not(.on){color:#fff}

/* Stats bar */
.stat-bar{background:#16305A;padding:8px 20px;display:flex;gap:24px;flex-wrap:wrap}
.stat{text-align:center;min-width:50px}
.stat-n{font-size:20px;font-weight:700;color:#fff;line-height:1.1}
.stat-l{font-size:10px;color:#93B5D5;margin-top:1px}

/* Toast */
.toast{position:fixed;top:16px;right:20px;background:#166534;color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1}

/* Filters */
.filters{background:#fff;padding:10px 20px;border-bottom:1px solid #E5E7EB;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filters input,.filters select{font-size:12px;padding:6px 10px;border:1px solid #D1D5DB;border-radius:8px;background:#fff;color:#111;min-width:120px;outline:none}
.filters input:focus,.filters select:focus{border-color:#1F3864;box-shadow:0 0 0 2px rgba(31,56,100,.15)}
.filters input{flex:1;min-width:160px}
.fcnt{font-size:11px;color:#9CA3AF;margin-left:auto;white-space:nowrap}

/* Views */
.view{display:none}
.view.active{display:block}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#1F3864}
thead th{color:#fff;font-weight:600;padding:8px 10px;text-align:left;white-space:nowrap;font-size:11px}
thead th:first-child{padding-left:16px}
tbody tr{border-bottom:1px solid #F3F4F6;cursor:pointer;transition:.1s}
tbody tr:nth-child(even){background:#FAFAFA}
tbody tr:hover{background:#EFF6FF}
tbody td{padding:7px 10px;vertical-align:top}
tbody td:first-child{padding-left:16px}
.firma-name{font-weight:700;font-size:12px;color:#1F2937}
.sec-row{display:flex;align-items:center;gap:4px;margin-top:2px}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-lbl{font-size:10px;color:#9CA3AF}
.kontakt-main{font-size:12px;color:#374151}
.kontakt-tel{font-size:10px;color:#9CA3AF;margin-top:1px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seg-cell{font-size:11px;color:#6B7280}
.notiz-cell{font-size:11px;color:#6B7280;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flag{font-size:12px}

/* Badges */
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;white-space:nowrap;border:1px solid}
.s-warm,.s-aktiv{background:#DCFCE7;color:#166534;border-color:#86EFAC}
.s-positiv,.s-gespraech{background:#DBEAFE;color:#1E40AF;border-color:#93C5FD}
.s-angebot{background:#EDE9FE;color:#5B21B6;border-color:#C4B5FD}
.s-email{background:#E0F2FE;color:#0369A1;border-color:#7DD3FC}
.s-ausstehend{background:#FEF9C3;color:#854D0E;border-color:#FDE047}
.s-abgeschlossen{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
.s-keininteresse{background:#F3F4F6;color:#6B7280;border-color:#D1D5DB}
.s-offen{background:#F9FAFB;color:#6B7280;border-color:#E5E7EB}
.prio-h{color:#166534;font-weight:700;font-size:11px}
.prio-m{color:#1D4ED8;font-weight:600;font-size:11px}
.prio-l{color:#9CA3AF;font-size:11px}
.edit-btn{font-size:11px;color:#1F3864;padding:3px 10px;border:1px solid #D1D5DB;border-radius:6px;cursor:pointer;background:#fff;transition:.1s;white-space:nowrap}
.list-drag-handle{color:#D1D5DB;font-size:14px;cursor:grab;padding:0 4px;user-select:none;line-height:1}
.list-drag-handle:hover{color:#9CA3AF}
tbody tr.dragging{opacity:0.4;background:#EFF6FF!important}
tbody tr.drag-over-top{border-top:3px solid #C9A227!important}
tbody tr.drag-over-bottom{border-bottom:3px solid #C9A227!important}
.edit-btn:hover{background:#EFF6FF;border-color:#1F3864}

/* Kanban */
.kanban-scroll{overflow-x:auto;padding:16px 20px}
.kanban-board{display:flex;gap:12px;min-width:max-content}
.k-col{width:180px;flex-shrink:0}
.k-col-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.k-cnt{font-size:10px;color:#9CA3AF;background:#F3F4F6;padding:1px 7px;border-radius:99px}
.k-card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:.1s}
.k-card:hover{border-color:#93C5FD;box-shadow:0 1px 4px rgba(31,56,100,.1)}
.k-card-name{font-size:11px;font-weight:700;color:#1F2937;line-height:1.3;margin-bottom:3px}
.k-card-seg{font-size:10px;color:#9CA3AF;margin-bottom:6px}
.k-card-foot{display:flex;justify-content:space-between;align-items:center}
.k-drag-handle{font-size:14px;color:#D1D5DB;position:absolute;top:6px;right:7px;cursor:grab;line-height:1;user-select:none}
.k-drag-handle:active{cursor:grabbing}
.k-card{position:relative}
.k-card[draggable="true"]{cursor:grab}
.k-card[draggable="true"]:active{cursor:grabbing}
.k-card:hover .k-drag-handle{color:#9CA3AF}
.k-drop-zone{min-height:60px;border-radius:6px;transition:background .15s,border .15s;padding:2px}
.k-drop-zone.k-drop-over{background:#EFF6FF;border:2px dashed #93C5FD;border-radius:6px}
.k-empty{font-size:10px;color:#D1D5DB;text-align:center;padding:16px 0;border:1.5px dashed #E5E7EB;border-radius:6px;margin:2px}
.k-drop-over .k-empty{border-color:#93C5FD;color:#93C5FD}

/* Stats */
.stats-wrap{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.stats-wrap{grid-template-columns:1fr}}
.stats-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:14px}
.stats-card h3{font-size:12px;font-weight:700;color:#374151;margin-bottom:12px}
.bar-row{margin-bottom:8px}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.bar-lbl-name{color:#4B5563}
.bar-lbl-n{font-weight:700;color:#1F2937}
.bar-track{height:7px;background:#F3F4F6;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #F3F4F6;font-size:11px}
.status-row:last-child{border:none}
.ti-card{background:#FFFBEB;border:1px solid #FCD34D;border-radius:10px;padding:14px;grid-column:1/-1}
.ti-card-hdr{font-size:12px;font-weight:700;color:#92400E;margin-bottom:8px}
.ti-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #FDE68A;font-size:11px}
.ti-row:last-child{border:none}
.ti-firma{color:#1F2937;font-weight:600}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.modal-hdr{background:#1F3864;padding:14px 18px;display:flex;justify-content:space-between;align-items:start}
.modal-hdr-firma{color:#fff;font-size:14px;font-weight:700}
.modal-hdr-sec{color:#93B5D5;font-size:11px;margin-top:2px}
.modal-close{background:none;border:none;color:#93B5D5;font-size:24px;cursor:pointer;line-height:1;padding:0 2px}
.modal-close:hover{color:#fff}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.4px}
.form-input{font-size:13px;padding:7px 11px;border:1px solid #D1D5DB;border-radius:8px;background:#fff;color:#1F2937;outline:none;transition:.15s}
.form-input:focus{border-color:#1F3864;box-shadow:0 0 0 3px rgba(31,56,100,.12)}
textarea.form-input{resize:vertical;min-height:64px;font-family:inherit}
.modal-foot{padding:12px 18px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid #F3F4F6}
.btn-cancel{font-size:13px;padding:7px 18px;border:1px solid #D1D5DB;border-radius:8px;background:#fff;color:#6B7280;cursor:pointer;font-weight:600}
.btn-cancel:hover{background:#F9FAFB}
.btn-save{font-size:13px;padding:7px 20px;background:#1F3864;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;transition:.15s}
.btn-save:hover{background:#16305A}
.btn-new{font-size:12px;font-weight:700;padding:6px 16px;background:#C9A227;color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0}
.btn-new:hover{background:#B8860B}
.btn-delete{font-size:11px;color:#DC2626;padding:3px 8px;border:1px solid #FCA5A5;border-radius:6px;cursor:pointer;background:#FEF2F2;font-weight:600}
.btn-delete:hover{background:#FEE2E2}

/* List drag-drop */
.status-select{font-size:10px;padding:2px 4px;border:1px solid #D1D5DB;border-radius:5px;background:white;color:#111;cursor:pointer;max-width:120px}
/* Netzwerk */
.netz-btn{font-size:11px;font-weight:600;padding:5px 10px;border:1px solid #D1D5DB;border-radius:7px;background:white;cursor:pointer;color:#1F3864;transition:.1s}
.netz-btn:hover{background:#EFF6FF;border-color:#1F3864}
.netz-btn.active{background:#1F3864;color:white}
.netz-node{position:absolute;transform:translate(-50%,-50%);cursor:grab;user-select:none;z-index:10;transition:box-shadow .15s}
.netz-node:active{cursor:grabbing}
.netz-node-inner{background:white;border:2px solid #1F3864;border-radius:10px;padding:7px 10px;font-size:10px;font-family:system-ui,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.1);min-width:90px;max-width:140px;text-align:center;line-height:1.3}
.netz-node-inner b{display:block;font-size:11px;color:#1F3864;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.netz-node-inner small{color:#6B7280;font-size:9px}
.netz-node.selected .netz-node-inner{border-color:#C9A227;box-shadow:0 0 0 3px rgba(201,162,39,.25)}
.netz-node.highlighted .netz-node-inner{border-color:#C9A227;background:#FFFBEB;box-shadow:0 0 0 4px rgba(201,162,39,.35)}
.netz-node.dimmed .netz-node-inner{opacity:0.25}
.netz-search-wrap{position:relative;display:flex;align-items:center}
#netz-search{font-size:12px;padding:5px 28px 5px 10px;border:1px solid #D1D5DB;border-radius:7px;width:180px;outline:none;font-family:system-ui,sans-serif}
#netz-search:focus{border-color:#1F3864;box-shadow:0 0 0 2px rgba(31,56,100,.12)}
#netz-search-clear{position:absolute;right:7px;cursor:pointer;color:#9CA3AF;font-size:14px;background:none;border:none;line-height:1;display:none}
#netz-search-clear:hover{color:#1F3864}
.netz-link-label{position:absolute;font-size:9px;background:white;border:1px solid #E5E7EB;border-radius:4px;padding:1px 4px;color:#6B7280;pointer-events:none;z-index:15;transform:translate(-50%,-50%)}

</style>
</head>
<body>
<div style="background:red;color:white;padding:10px;text-align:center;font-size:16px;position:relative;z-index:9999">⚠ UPDATE TEST v1.0.2</div> 

<div class="toast" id="toast">✓ Gespeichert</div>

<!-- Header -->
<div class="hdr">
  <div class="hdr-left">
    <div class="title">Hasli Transport Roat — CRM</div>
    <div class="sub">Kühltransporte Schweiz &nbsp;|&nbsp; Akquisitions-Pipeline</div>
  </div>
  <div class="tab-bar-outer">
    <button class="tab on" onclick="switchTab('list')">Liste</button>
    <button class="tab" onclick="switchTab('kanban')">Kanban</button>
    <button class="tab" onclick="switchTab('stats')">Statistik</button>
    <button class="tab" onclick="switchTab('netz')">Netzwerk</button>
  </div>
</div>

<!-- Stats bar -->
<div class="stat-bar" id="stat-bar"></div>

<!-- Filters -->
<div class="filters">
  <input id="fsearch" placeholder="🔍 Suchen nach Firma, Kontakt, Segment…" oninput="render()">
  <select id="fsec" onchange="render()">
    <option value="">Alle Sektionen</option>
    <option value="A">A — Pipeline</option>
    <option value="B">B — Direktkunden</option>
    <option value="C">C — Spediteure</option>
    <option value="D">D — Pharma / ADR</option>
    <option value="E1">E1 — Tessin ★ (IT)</option>
    <option value="E2">E2 — Westschweiz</option>
    <option value="F">F — CH Lebensmittelproduzenten</option>
  </select>
  <select id="fprio" onchange="render()">
    <option value="">Alle Prioritäten</option>
    <option>Hoch</option><option>Mittel</option><option>Niedrig</option>
  </select>
  <select id="fstat" onchange="render()">
    <option value="">Alle Status</option>
    <option>Offen</option><option>Warm</option><option>Aktiv</option>
    <option>Positiv</option><option>Gespräch geführt</option>
    <option>Angebot gemacht</option><option>E-Mail gesandt</option>
    <option>Ausstehend</option><option>Abgeschlossen</option><option>Kein Interesse</option>
  </select>
  <select id="fkanton" onchange="render()">
    <option value="">Alle Kantone</option>
    <option>AG</option><option>AI</option><option>AR</option><option>AT</option><option>BE</option>
    <option>BL</option><option>BS</option><option>FL</option><option>FR</option><option>GE</option>
    <option>GL</option><option>GR</option><option>LU</option><option>NE</option><option>NW</option>
    <option>OW</option><option>SG</option><option>SH</option><option>SO</option><option>SZ</option>
    <option>TG</option><option>TI</option><option>UR</option><option>VD</option><option>VS</option>
    <option>ZG</option><option>ZH</option>
  </select>
  <span class="fcnt" id="fcnt"></span>
  <button class="btn-new" onclick="openNew()">+ Neue Firma</button>
</div>

<!-- Views -->
<div id="view-list"   class="view active"><div class="tbl-wrap"><table><thead><tr><th style="width:24px"></th><th>Firma</th><th>Ort</th><th>Kanton</th><th>Kontakt</th><th>Status</th><th>Priorität</th><th>Notiz</th><th></th></tr></thead><tbody id="tbl-body"></tbody></table></div></div>
<div id="view-kanban" class="view"><div class="kanban-scroll"><div class="kanban-board" id="kanban-board"></div></div></div>
<div id="view-stats"  class="view"><div class="stats-wrap" id="stats-content"></div></div>
<div id="view-netz" class="view"><div id="netz-container" style="position:relative;width:100%;height:calc(100vh - 180px);overflow:hidden;background:#F8FAFC;border-top:1px solid #E5E7EB"><canvas id="netz-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas><div id="netz-nodes" style="position:absolute;top:0;left:0;width:100%;height:100%"></div><div id="netz-toolbar" style="position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:20"><div class="netz-search-wrap"><input id="netz-search" placeholder="🔍 Firma suchen…" oninput="netzSearch(this.value)" autocomplete="off"><button id="netz-search-clear" onclick="netzClearSearch()" title="Suche leeren">×</button></div><button onclick="netzReset()" class="netz-btn">↺ Reset</button><button onclick="netzAddLink()" class="netz-btn" id="btn-addlink">+ Verbindung</button><button onclick="netzDeleteLink()" class="netz-btn" id="btn-dellink">✕ Linie löschen</button><span id="netz-hint" style="font-size:11px;color:#6B7280;padding:4px 8px;background:white;border-radius:6px;border:1px solid #E5E7EB"></span></div><div id="netz-legend" style="position:absolute;bottom:10px;left:10px;background:white;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:10px;color:#6B7280;z-index:20"><b style="color:#1F3864">Verbindungstypen:</b><br><span style="color:#166534">▬</span> Lieferant von &nbsp; <span style="color:#1E40AF">▬</span> Subunternehmer &nbsp; <span style="color:#9A3412">▬</span> Konkurrent &nbsp; <span style="color:#6B21A8">▬</span> Partner &nbsp; <span style="color:#6B7280">▬</span> Sonstiges</div></div></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-hdr-firma" id="m-firma"></div><div class="modal-hdr-sec" id="m-sec"></div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Firma</label><input class="form-input" id="m-f-firma"></div>
        <div class="form-group"><label class="form-label">Kontakt</label><input class="form-input" id="m-f-kontakt"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sektion</label>
          <select class="form-input" id="m-f-sec">
            <option value="A">A — Pipeline</option>
            <option value="B">B — Direktkunden</option>
            <option value="C">C — Spediteure</option>
            <option value="D">D — Pharma / ADR</option>
            <option value="E1">E1 — Tessin ★ (IT)</option>
            <option value="E2">E2 — Westschweiz</option>
            <option value="F">F — CH Lebensmittelproduzenten</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Sprache</label>
          <select class="form-input" id="m-f-lang">
            <option value="DE">DE — Deutsch</option>
            <option value="IT">IT — Italiano 🇮🇹</option>
            <option value="FR">FR — Français 🇫🇷</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Telefon / E-Mail</label><input class="form-input" id="m-f-tel"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ort</label><input class="form-input" id="m-f-ort" placeholder="z.B. Arbon"></div>
        <div class="form-group"><label class="form-label">Kanton</label><input class="form-input" id="m-f-kanton" placeholder="z.B. TG" style="max-width:100px"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-input" id="m-f-status">
            <option>Offen</option><option>Warm</option><option>Aktiv</option><option>Positiv</option>
            <option>Gespräch geführt</option><option>Angebot gemacht</option><option>E-Mail gesandt</option>
            <option>Ausstehend</option><option>Abgeschlossen</option><option>Kein Interesse</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Priorität</label>
          <select class="form-input" id="m-f-prio">
            <option>Hoch</option><option>Mittel</option><option>Niedrig</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Notiz</label><textarea class="form-input" id="m-f-notiz"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-delete" id="btn-delete" onclick="deleteContact()">Löschen</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveContact()">Speichern</button>
    </div>
  </div>
</div>

<script>
const SEC_COLORS  = {A:"#1F3864",B:"#166534",C:"#6B21A8",D:"#9A3412",E1:"#92400E",E2:"#0E7490",F:"#065F46"};
const SEC_LABELS  = {A:"A — Pipeline",B:"B — Direktkunden",C:"C — Spediteure",D:"D — Pharma/ADR",E1:"E1 — Tessin ★ (IT)",E2:"E2 — Westschweiz",F:"F — CH Lebensmittelproduzenten"};
const FLAGS = {IT:"🇮🇹",FR:"🇫🇷",DE:""};
const STATUS_OPTIONS = ["Offen","Warm","Aktiv","Positiv","Gespräch geführt","Angebot gemacht","E-Mail gesandt","Ausstehend","Abgeschlossen","Kein Interesse"];
const STATUS_STYLE_INLINE = {
  "Warm":"background:#DCFCE7;color:#166534;border-color:#86EFAC",

let contacts = [];
let currentTab = "list";
let editingId  = null;

function loadData() {
  try {
    const saved = localStorage.getItem("hasli-crm-v3");
    if (saved) {
      const savedContacts = JSON.parse(saved);
      // Keep user edits, but add any new default contacts not yet in saved list
      const savedIds = new Set(savedContacts.map(c => c.id));
      const newDefaults = DEFAULT_CONTACTS.filter(c => !savedIds.has(c.id));
      contacts = [...savedContacts, ...newDefaults];
    } else {
      // Also migrate from old key if exists
      const old = localStorage.getItem("hasli-crm-v2");
      if (old) {
        const oldContacts = JSON.parse(old);
        const oldIds = new Set(oldContacts.map(c => c.id));
        const newDefaults = DEFAULT_CONTACTS.filter(c => !oldIds.has(c.id));
        contacts = [...oldContacts, ...newDefaults];
      } else {
        contacts = [...DEFAULT_CONTACTS];
      }
    }
  } catch(e) {
    contacts = [...DEFAULT_CONTACTS];
  }
  render();
}

function saveData() {
  try {
    localStorage.setItem("hasli-crm-v3", JSON.stringify(contacts));
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
  } catch(e) {}
}

function getFiltered() {
  const q    = document.getElementById("fsearch").value.toLowerCase();
  const sec  = document.getElementById("fsec").value;
  const prio = document.getElementById("fprio").value;
  const stat = document.getElementById("fstat").value;
  const kt = document.getElementById("fkanton").value;
  return contacts.filter(c => {
    if (q && ![c.firma, c.kontakt, c.segment, c.notiz, c.ort||"", c.kanton||""].some(x => x.toLowerCase().includes(q))) return false;
    if (sec  && c.s      !== sec)  return false;
    if (prio && c.prio   !== prio) return false;
    if (stat && c.status !== stat) return false;
    if (kt   && (c.kanton||"")   !== kt)  return false;
    return true;
  });
}

function badgeHtml(status) {
  const cls = STATUS_CLS[status] || "s-offen";

  const cls = p==="Hoch" ? "prio-h" : p==="Mittel" ? "prio-m" : "prio-l";

let listDragId = null;

function listDragStart(e, id) {
  listDragId = id;
  e.dataTransfer.effectAllowed = "move";
  setTimeout(() => { const r = document.getElementById("lrow-"+id); if(r) r.classList.add("dragging"); }, 0);
}

function listDragEnd(e) {
  document.querySelectorAll("tbody tr").forEach(r => r.classList.remove("dragging","drag-over-top","drag-over-bottom"));
  listDragId = null;
}

function listDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  const rect = e.currentTarget.getBoundingClientRect();
  e.currentTarget.classList.toggle("drag-over-top",    e.clientY < rect.top + rect.height/2);
  e.currentTarget.classList.toggle("drag-over-bottom", e.clientY >= rect.top + rect.height/2);
}

function listDragEnter(e) { e.preventDefault(); }

function listDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget))
    e.currentTarget.classList.remove("drag-over-top","drag-over-bottom");
}

function listDrop(e, targetId) {
  e.preventDefault();
  if (!listDragId || listDragId === targetId) return;
  document.querySelectorAll("tbody tr").forEach(r => r.classList.remove("drag-over-top","drag-over-bottom"));
  const fromIdx = contacts.findIndex(c => c.id === listDragId);
  const toIdx   = contacts.findIndex(c => c.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const insertAfter = e.clientY >= rect.top + rect.height/2;
  const [moved] = contacts.splice(fromIdx, 1);
  const newIdx = contacts.findIndex(c => c.id === targetId);
  contacts.splice(insertAfter ? newIdx+1 : newIdx, 0, moved);
  listDragId = null;
  saveData();
  render();
}

let dragId = null;
let wasDragged = false;

function dragStart(e, id) {
  dragId = id;
  wasDragged = false;
  e.dataTransfer.effectAllowed = "move";
  setTimeout(() => {
    const el = document.getElementById("kcard-" + id);
    if (el) { el.style.opacity = "0.4"; el.style.transform = "scale(0.97)"; }
  }, 0);
}

function dragEnd(e) {
  wasDragged = (dragId !== null);
  setTimeout(() => { wasDragged = false; }, 100);
  if (dragId) {
    const el = document.getElementById("kcard-" + dragId);
    if (el) { el.style.opacity = "1"; el.style.transform = ""; }
  }
  document.querySelectorAll(".k-drop-zone").forEach(z => z.classList.remove("k-drop-over"));
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
}

function dragEnter(e) {
  e.preventDefault();
  e.currentTarget.classList.add("k-drop-over");
}

function dragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove("k-drop-over");
  }
}

function drop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove("k-drop-over");
  if (!dragId) return;
  const c = contacts.find(x => x.id === dragId);
  if (!c || c.status === newStatus) { dragId = null; return; }
  contacts = contacts.map(x => x.id === dragId ? {...x, status: newStatus} : x);
  dragId = null;
  saveData();
  render();
}

  ).join("");
  // Prio bars
  const prioRows = [["Hoch","#166534"],["Mittel","#1D4ED8"],["Niedrig","#9CA3AF"]].map(([p,col]) => {
    const cnt = contacts.filter(c=>c.prio===p).length;
    const pct = n ? Math.round(cnt/n*100) : 0;
    return `<div class="bar-row">
      <div class="bar-lbl">
        <span style="font-weight:700;color:${col};font-size:12px">${p}</span>
        <span style="font-size:11px;color:#6B7280">${cnt} (${pct}%)</span>
      </div>
      <div class="bar-track" style="height:10px"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join("");

  document.getElementById("stats-content").innerHTML = `
    <div class="stats-card"><h3>Kontakte nach Sektion</h3>${secRows}</div>
    <div class="stats-card"><h3>Status-Übersicht</h3>${statRows}</div>
    <div class="ti-card"><div class="ti-card-hdr">🇮🇹 Tessin-Fokus — Sprachvorteil Italiano (Vater)</div><div>${tiRows}</div></div>
    <div class="stats-card" style="grid-column:1/-1"><h3>Priorität-Übersicht</h3>${prioRows}</div>`;
}

function render() {
  const filtered = getFiltered();
  document.getElementById("fcnt").textContent = filtered.length + " Kontakte";
  renderStats();
  if (currentTab === "list")   renderList(filtered);
  if (currentTab === "kanban") renderKanban(filtered);
  if (currentTab === "stats")  renderStatsView();
  if (currentTab === "netz")   renderNetz();
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll(".view").forEach(el => el.classList.toggle("active", el.id === "view-" + t));
  document.querySelectorAll(".tab").forEach((el,i) => el.classList.toggle("on", ["list","kanban","stats","netz"][i]===t));
  if (t === "netz") {
    setTimeout(renderNetz, 50);
  } else {
    const inp = document.getElementById("netz-search");
    if (inp) { inp.value = ""; netzSearch(""); }
    render();
  }
}

function openModal(id) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById("m-firma").textContent   = c.firma;
  document.getElementById("m-sec").textContent     = SEC_LABELS[c.s] || c.s;
  document.getElementById("m-f-firma").value       = c.firma;
  document.getElementById("m-f-kontakt").value     = c.kontakt;
  document.getElementById("m-f-tel").value         = c.tel;
  document.getElementById("m-f-status").value      = c.status;
  document.getElementById("m-f-prio").value        = c.prio;
  document.getElementById("m-f-notiz").value       = c.notiz;
  document.getElementById("m-f-sec").value         = c.s;
  document.getElementById("m-f-lang").value        = c.lang || "DE";
  document.getElementById("btn-delete").style.display = "block";
  document.getElementById("modal").classList.add("open");
}

function openNew() {
  editingId = null;
  document.getElementById("m-firma").textContent  = "Neue Firma";
  document.getElementById("m-sec").textContent    = "Neuer Eintrag";
  document.getElementById("m-f-firma").value      = "";
  document.getElementById("m-f-kontakt").value    = "";
  document.getElementById("m-f-tel").value        = "—";
  document.getElementById("m-f-status").value     = "Offen";
  document.getElementById("m-f-prio").value       = "Hoch";
  document.getElementById("m-f-notiz").value      = "";
  document.getElementById("m-f-sec").value        = "A";
  document.getElementById("m-f-lang").value       = "DE";
  document.getElementById("m-f-ort").value        = "";
  document.getElementById("m-f-kanton").value     = "";
  document.getElementById("btn-delete").style.display = "none";
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("m-f-firma").focus(), 100);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  editingId = null;
}

function saveContact() {
  const firma = document.getElementById("m-f-firma").value.trim();
  if (!firma) { alert("Bitte Firmenname eingeben."); return; }
  if (editingId) {
    // Update existing
    contacts = contacts.map(c => {
      if (c.id !== editingId) return c;
      return { ...c,
        firma:   firma,
        kontakt: document.getElementById("m-f-kontakt").value,
        tel:     document.getElementById("m-f-tel").value,
        status:  document.getElementById("m-f-status").value,
        prio:    document.getElementById("m-f-prio").value,
        notiz:   document.getElementById("m-f-notiz").value,
      ort:     document.getElementById("m-f-ort").value,
      kanton:  document.getElementById("m-f-kanton").value,
        s:       document.getElementById("m-f-sec").value,
        lang:    document.getElementById("m-f-lang").value,
      };
    });
  } else {
    // Add new
    const newContact = {
      id:      "u" + Date.now(),
      s:       document.getElementById("m-f-sec").value,
      firma:   firma,
      kontakt: document.getElementById("m-f-kontakt").value || "—",
      tel:     document.getElementById("m-f-tel").value || "—",
      segment: "",
      status:  document.getElementById("m-f-status").value,
      prio:    document.getElementById("m-f-prio").value,
      notiz:   document.getElementById("m-f-notiz").value,
      ort:     document.getElementById("m-f-ort").value,
      kanton:  document.getElementById("m-f-kanton").value,
      lang:    document.getElementById("m-f-lang").value,
    };
    contacts.push(newContact);
  }
  saveData();
  closeModal();
  render();
}

function deleteContact() {
  if (!editingId) return;
  const c = contacts.find(x => x.id === editingId);
  if (!c) return;
  if (!confirm(`"${c.firma}" wirklich löschen?`)) return;
  contacts = contacts.filter(x => x.id !== editingId);
  saveData();
  closeModal();
  render();
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}


// ════════════════════════════════════════════════════════════════════════════
// NETZWERK — Interaktive Beziehungsmap
// ════════════════════════════════════════════════════════════════════════════

const LINK_TYPES = {
  "lieferant":  { color: "#166534", label: "Lieferant von" },
  "sub":        { color: "#1E40AF", label: "Subunternehmer" },
  "konkurrent": { color: "#9A3412", label: "Konkurrent" },
  "partner":    { color: "#6B21A8", label: "Partner" },
  "sonstig":    { color: "#6B7280", label: "Sonstiges" },
};

// Start with empty links — user creates all connections manually
const DEFAULT_LINKS = [];

let netzLinks = [];
let netzPositions = {}; // id -> {x, y}
let netzMode = "normal"; // normal | addlink | dellink
let netzLinkFrom = null;
let netzSelected = null;
let netzDragNode = null;
let netzDragOffset = {x:0, y:0};

async function loadNetzData() {
  try {
    const r = await window.storage.get("crm-netz-v1");
    if (r && r.value) {
      const d = JSON.parse(r.value);
      netzLinks = d.links || [...DEFAULT_LINKS];
      netzPositions = d.positions || {};
    } else {
      netzLinks = [...DEFAULT_LINKS];
      netzPositions = {};
    }
  } catch(e) {
    netzLinks = [...DEFAULT_LINKS];
    netzPositions = {};
  }
}

async function saveNetzData() {
  try {
    await window.storage.set("crm-netz-v1", JSON.stringify({links: netzLinks, positions: netzPositions}));
  } catch(e) {}
}

function getVisibleContacts() {
  // Always show ALL contacts — user needs to see all to create connections
  return contacts;
}

function initPositions() {
  const visible = getVisibleContacts();
  const W = document.getElementById("netz-container").offsetWidth || 900;
  const H = document.getElementById("netz-container").offsetHeight || 600;
  
  // Group by section for initial layout
  const sections = {};
  visible.forEach(c => {
    if (!sections[c.s]) sections[c.s] = [];
    sections[c.s].push(c);
  });
  
  const sKeys = Object.keys(sections);
  sKeys.forEach((s, si) => {
    const angle = (si / sKeys.length) * Math.PI * 2;
    const cx = W/2 + Math.cos(angle) * W * 0.3;
    const cy = H/2 + Math.sin(angle) * H * 0.28;
    sections[s].forEach((c, i) => {
      if (!netzPositions[c.id]) {
        const spread = 80;
        const a2 = (i / Math.max(sections[s].length,1)) * Math.PI * 2;
        netzPositions[c.id] = {
          x: Math.max(80, Math.min(W-80, cx + Math.cos(a2)*spread*(i>0?1:0))),
          y: Math.max(50, Math.min(H-50, cy + Math.sin(a2)*spread*(i>0?1:0)))
        };
      }
    });
  });
}

function pointToSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay;
  const lenSq = dx*dx+dy*dy;
  if (lenSq === 0) return Math.hypot(px-ax, py-ay);
  let t = ((px-ax)*dx + (py-ay)*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax+t*dx), py - (ay+t*dy));
}

function drawCanvas() {
  const container = document.getElementById("netz-container");
  const canvas = document.getElementById("netz-canvas");
  if (!canvas || !container) return;
  canvas.width  = container.offsetWidth;
  canvas.height = container.offsetHeight;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  netzLinks.forEach((link, li) => {
    const fp = netzPositions[link.from];
    const tp = netzPositions[link.to];
    if (!fp || !tp) return;
    const lt = LINK_TYPES[link.type] || LINK_TYPES["sonstig"];
    const isHovered = (netzHoveredLink === li);
    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    ctx.lineTo(tp.x, tp.y);
    ctx.strokeStyle = isHovered && netzMode==="dellink" ? "#EF4444" : lt.color;
    ctx.lineWidth = isHovered ? 4 : 2;
    ctx.setLineDash([]);
    ctx.stroke();
    // Arrow
    const dx = tp.x - fp.x, dy = tp.y - fp.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    if (len > 40) {
      const ux = dx/len, uy = dy/len;
      const mx = fp.x + ux * (len-28), my = fp.y + uy * (len-28);
      const size = 7;
      ctx.beginPath();
      ctx.moveTo(mx + ux*size, my + uy*size);
      ctx.lineTo(mx - uy*size*0.6, my + ux*size*0.6);
      ctx.lineTo(mx + uy*size*0.6, my - ux*size*0.6);
      ctx.closePath();
      ctx.fillStyle = isHovered && netzMode==="dellink" ? "#EF4444" : lt.color;
      ctx.fill();
    }
    // Label in middle
    if (link.label) {
      const mx2 = (fp.x+tp.x)/2, my2 = (fp.y+tp.y)/2;
      ctx.font = "10px system-ui";
      ctx.fillStyle = "#6B7280";
      ctx.textAlign = "center";
      ctx.fillText(link.label, mx2, my2-6);
    }
  });
}

let netzHoveredLink = -1;

function setupCanvasEvents() {
  const canvas = document.getElementById("netz-canvas");
  if (!canvas) return;
  canvas.addEventListener("mousemove", (e) => {
    if (netzMode !== "dellink") { if (netzHoveredLink !== -1) { netzHoveredLink=-1; drawCanvas(); } return; }
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let found = -1;
    netzLinks.forEach((link, i) => {
      const fp = netzPositions[link.from], tp = netzPositions[link.to];
      if (!fp || !tp) return;
      if (pointToSegmentDist(mx, my, fp.x, fp.y, tp.x, tp.y) < 10) found = i;
    });
    if (found !== netzHoveredLink) { netzHoveredLink = found; drawCanvas(); }
    canvas.style.cursor = found !== -1 ? "pointer" : "default";
  });
  canvas.addEventListener("click", (e) => {
    if (netzMode !== "dellink" || netzHoveredLink === -1) return;
    if (confirm("Diese Verbindung löschen?")) {
      netzLinks.splice(netzHoveredLink, 1);
      netzHoveredLink = -1;
      saveNetzData();
      renderNetz();
    }
  });
}

function buildNetzNodes() {
  const nodesDiv = document.getElementById("netz-nodes");
  if (!nodesDiv) return;
  const visible = getVisibleContacts();
  nodesDiv.innerHTML = "";
  
  visible.forEach(c => {
    const pos = netzPositions[c.id] || {x:200, y:200};
    const div = document.createElement("div");
    div.className = "netz-node" + (netzSelected === c.id ? " selected" : "");
    div.id = "nnode-" + c.id;
    div.style.left = pos.x + "px";
    div.style.top  = pos.y + "px";
    
    const dotColor = SEC_COLORS[c.s] || "#1F3864";
    div.innerHTML = `<div class="netz-node-inner" style="border-color:${dotColor}">
      <b title="${esc(c.firma)}">${esc(c.firma.length>18 ? c.firma.slice(0,17)+"…" : c.firma)}</b>
      <small>${esc(c.segment||"")}</small>
      <small style="color:${dotColor}">${c.kanton||""}</small>
    </div>`;
    
    // Click
    div.addEventListener("click", (e) => {
      e.stopPropagation();
      if (netzMode === "addlink") {
        if (!netzLinkFrom) {
          netzLinkFrom = c.id;
          div.classList.add("selected");
          document.getElementById("netz-hint").textContent = "Jetzt Zielfirma klicken";
        } else if (netzLinkFrom !== c.id) {
          // Show type selector
          const type = prompt("Verbindungstyp:\n1=Lieferant von  2=Subunternehmer  3=Partner  4=Konkurrent  5=Sonstiges\nNummer eingeben:", "1");
          const typeMap = {"1":"lieferant","2":"sub","3":"partner","4":"konkurrent","5":"sonstig"};
          const t = typeMap[type] || "sonstig";
          const label = prompt("Beschriftung (optional):", "");
          netzLinks.push({from: netzLinkFrom, to: c.id, type: t, label: label||""});
          netzLinkFrom = null;
          netzMode = "normal";
          document.getElementById("btn-addlink").classList.remove("active");
          document.getElementById("netz-hint").textContent = "";
          saveNetzData();
          renderNetz();
        }
      } else if (netzMode === "dellink") {
        // Find links connected to this node and let user pick
        const myLinks = netzLinks.filter(l => l.from === c.id || l.to === c.id);
        if (!myLinks.length) { alert("Keine Verbindungen gefunden."); return; }
        const choices = myLinks.map((l,i) => {
          const other = contacts.find(x => x.id === (l.from===c.id?l.to:l.from));
          return `${i+1}: ${l.from===c.id?"→":"←"} ${other?other.firma:"?"} (${LINK_TYPES[l.type]?.label||l.type})`;
        }).join("\n");
        const sel = prompt("Welche Verbindung löschen?\n" + choices + "\nNummer eingeben:");
        const idx = parseInt(sel) - 1;
        if (idx >= 0 && idx < myLinks.length) {
          const toRemove = myLinks[idx];
          // Find by index in netzLinks (not by reference which breaks after JSON parse)
          const globalIdx = netzLinks.findIndex(l =>
            l.from === toRemove.from && l.to === toRemove.to && l.type === toRemove.type && l.label === toRemove.label
          );
          if (globalIdx !== -1) netzLinks.splice(globalIdx, 1);
          saveNetzData();
          renderNetz();
        }
      } else {
        netzSelected = netzSelected === c.id ? null : c.id;
        renderNetz();
      }
    });
    
    // Drag
    div.addEventListener("mousedown", (e) => {
      if (netzMode !== "normal") return;
      e.preventDefault();
      netzDragNode = c.id;
      const container = document.getElementById("netz-container");
      const rect = container.getBoundingClientRect();
      netzDragOffset = {
        x: e.clientX - rect.left - pos.x,
        y: e.clientY - rect.top  - pos.y
      };
      div.style.cursor = "grabbing";
    });
    
    nodesDiv.appendChild(div);
  });
  
  // Global mouse events
  const container = document.getElementById("netz-container");
  container.onmousemove = (e) => {
    if (!netzDragNode) return;
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left - netzDragOffset.x;
    const y = e.clientY - rect.top  - netzDragOffset.y;
    netzPositions[netzDragNode] = {
      x: Math.max(70, Math.min(rect.width-70, x)),
      y: Math.max(40, Math.min(rect.height-40, y))
    };
    const el = document.getElementById("nnode-" + netzDragNode);
    if (el) { el.style.left = netzPositions[netzDragNode].x + "px"; el.style.top = netzPositions[netzDragNode].y + "px"; }
    drawCanvas();
  };
  container.onmouseup = () => {
    if (netzDragNode) { saveNetzData(); netzDragNode = null; }
    document.querySelectorAll(".netz-node").forEach(n => n.style.cursor = "grab");
  };
  container.onmouseleave = () => { if (netzDragNode) { saveNetzData(); netzDragNode = null; } };
  setupCanvasEvents();
}

function renderNetz() {
  if (!netzPositionsLoaded) { loadNetzData().then(() => { netzPositionsLoaded=true; initPositions(); buildNetzNodes(); drawCanvas(); }); return; }
  initPositions();
  buildNetzNodes();
  drawCanvas();
}

let netzPositionsLoaded = false;

function netzSearch(q) {
  const btn = document.getElementById("netz-search-clear");
  if (btn) btn.style.display = q ? "block" : "none";
  const term = q.toLowerCase().trim();
  document.querySelectorAll(".netz-node").forEach(el => {
    el.classList.remove("highlighted","dimmed");
    if (!term) return;
    const id = el.id.replace("nnode-","");
    const c  = contacts.find(x => x.id === id);
    if (!c) return;
    const match = [c.firma, c.segment, c.ort||"", c.kanton||"", c.kontakt]
      .some(v => v.toLowerCase().includes(term));
    el.classList.toggle("highlighted", match);
    el.classList.toggle("dimmed", !match);
  });
}

function netzClearSearch() {
  const inp = document.getElementById("netz-search");
  if (inp) { inp.value = ""; netzSearch(""); inp.focus(); }
}

function netzReset() {
  netzPositions = {};
  initPositions();
  buildNetzNodes();
  drawCanvas();
}

function netzAddLink() {
  netzMode = netzMode === "addlink" ? "normal" : "addlink";
  netzLinkFrom = null;
  document.getElementById("btn-addlink").classList.toggle("active", netzMode==="addlink");
  document.getElementById("btn-dellink").classList.remove("active");
  document.getElementById("netz-hint").textContent = netzMode==="addlink" ? "Erste Firma klicken (Quelle)" : "";
  if (netzMode !== "addlink") netzMode = "normal";
}

function netzDeleteLink() {
  netzMode = netzMode === "dellink" ? "normal" : "dellink";
  netzLinkFrom = null;
  document.getElementById("btn-dellink").classList.toggle("active", netzMode==="dellink");
  document.getElementById("btn-addlink").classList.remove("active");
  document.getElementById("netz-hint").textContent = netzMode==="dellink" ? "Verbindungslinie anklicken zum Löschen" : "";
}

window.addEventListener("resize", () => { if (currentTab==="netz") { buildNetzNodes(); drawCanvas(); } });

// Init
loadData();
</script>
