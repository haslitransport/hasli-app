<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hasli Transport Roat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1F3864;font-family:system-ui,sans-serif;display:flex;flex-direction:column}
.hdr{padding:24px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.logo{color:#C9A227;font-size:20px;font-weight:800;letter-spacing:.5px}
.sub{color:#93B5D5;font-size:11px;margin-top:3px}
.ver{color:#93B5D5;font-size:11px;margin-top:4px}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
.app-btn{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:16px 24px;
  cursor:pointer;transition:.2s;width:360px}
.app-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(201,162,39,.6);transform:translateY(-1px)}
.app-icon{font-size:30px}
.app-name{color:#fff;font-size:15px;font-weight:700}
.app-desc{color:#93B5D5;font-size:11px;margin-top:2px}
hr.div{width:360px;border:none;border-top:1px solid rgba(255,255,255,.1);margin:4px 0}
.action-btn{display:flex;align-items:center;gap:10px;border-radius:10px;padding:11px 18px;
  cursor:pointer;transition:.2s;width:360px;border:none;text-align:left}
.sync{background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.4)}
.sync:hover{background:rgba(201,162,39,.25)}
.sync span{color:#C9A227;font-size:13px;font-weight:600}
.upd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.upd:hover{background:rgba(255,255,255,.12)}
.upd span{color:#93B5D5;font-size:12px}
.upd.has-upd{background:rgba(22,101,52,.3);border-color:rgba(22,101,52,.6)}
.upd.has-upd span{color:#4ADE80}
.status{color:#6B7280;font-size:11px;min-height:18px;text-align:center;margin-top:2px}
/* Update modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.card{background:#fff;border-radius:14px;width:440px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.ch{background:#1F3864;padding:14px 18px;display:flex;align-items:center;gap:10px}
.ch h3{color:#fff;font-size:14px;margin:0}
.cb{padding:18px}
.cf{padding:12px 18px;background:#F9FAFB;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #E5E7EB}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-g{background:#fff;color:#6B7280;border:1px solid #D1D5DB}
.btn-grn{background:#166534;color:#fff}
.prog{width:100%;height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;margin:10px 0;display:none}
.prog-bar{height:100%;background:#166534;width:0%;transition:width .3s}
.notes{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:10px;
  font-size:12px;color:#374151;margin-top:10px;white-space:pre-wrap;display:none}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="logo">HASLI TRANSPORT ROAT</div>
    <div class="sub">CRM & Lieferschein System</div>
  </div>
  <div class="ver" id="ver">v1.0.4</div>
</div>

<div class="main">
  <div class="app-btn" onclick="openCRM()">
    <div class="app-icon">📋</div>
    <div>
      <div class="app-name">CRM & Kunden</div>
      <div class="app-desc">Kontakte, Pipeline, Akquisition, Netzwerk</div>
    </div>
  </div>

  <div class="app-btn" onclick="openLS()">
    <div class="app-icon">📦</div>
    <div>
      <div class="app-name">Lieferschein & Faktura</div>
      <div class="app-desc">Aufträge, PDFs, Rechnungen, ASTAG-Import</div>
    </div>
  </div>

  <hr class="div">

  <button class="action-btn sync" onclick="doSync()">
    <span style="font-size:17px">🔄</span>
    <span>CRM-Kontakte → Lieferschein synchronisieren</span>
  </button>

  <button class="action-btn upd" id="upd-btn" onclick="openUpdate()">
    <span style="font-size:15px">⬆</span>
    <span id="upd-txt">Update prüfen</span>
  </button>

  <div class="status" id="status"></div>
</div>

<!-- Update Modal -->
<div class="modal" id="upd-modal">
  <div class="card">
    <div class="ch"><span style="font-size:20px">🔄</span><h3>App aktualisieren</h3></div>
    <div class="cb">
      <div id="upd-msg" style="font-size:14px;color:#374151">Wird geprüft…</div>
      <div class="prog" id="upd-prog"><div class="prog-bar" id="upd-bar"></div></div>
      <div id="upd-detail" style="font-size:12px;color:#6B7280;margin-top:6px"></div>
      <div class="notes" id="upd-notes"></div>
    </div>
    <div class="cf">
      <button class="btn btn-g" onclick="closeUpdate()">Schliessen</button>
      <button class="btn btn-grn" id="upd-do" onclick="runUpdate()" style="display:none">⬇ Jetzt aktualisieren</button>
    </div>
  </div>
</div>

<script>
const api = window.electronAPI;

async function init() {
  if (!api) return;
  const v = await api.getVersion();
  document.getElementById('ver').textContent = 'v' + v;
  setTimeout(silentCheck, 2000);
}

async function openCRM() { if (api) await api.openCRM(); }
async function openLS()  { if (api) await api.openLS();  }

async function doSync() {
  const s = document.getElementById('status');
  s.style.color = '#C9A227'; s.textContent = '⏳ Synchronisiere…';
  try {
    const r = await api.syncCRMToLS();
    s.style.color = r.success ? '#4ADE80' : '#F87171';
    s.textContent  = r.success ? '✅ ' + r.count + ' Kontakte übertragen' : '⚠ ' + r.error;
  } catch(e) { s.style.color='#F87171'; s.textContent='⚠ '+e.message; }
  setTimeout(() => s.textContent = '', 4000);
}

async function silentCheck() {
  if (!api) return;
  try {
    const r = await api.checkUpdate();
    if (r.available) {
      document.getElementById('upd-btn').classList.add('has-upd');
      document.getElementById('upd-txt').textContent = '⬆ Update verfügbar: v' + r.remote;
    }
  } catch(e) {}
}

function openUpdate() {
  document.getElementById('upd-modal').classList.add('open');
  document.getElementById('upd-msg').textContent = 'Wird geprüft…';
  document.getElementById('upd-detail').textContent = '';
  document.getElementById('upd-notes').style.display = 'none';
  document.getElementById('upd-prog').style.display = 'none';
  document.getElementById('upd-do').style.display = 'none';
  checkUpdate();
}
function closeUpdate() { document.getElementById('upd-modal').classList.remove('open'); }

async function checkUpdate() {
  if (!api) { document.getElementById('upd-msg').textContent = '⚠ Nur in Desktop-App'; return; }
  try {
    const r = await api.checkUpdate();
    if (r.error) { document.getElementById('upd-msg').textContent = '⚠ ' + r.error; return; }
    if (r.available) {
      document.getElementById('upd-msg').textContent = '✅ Update verfügbar: v' + r.remote;
      document.getElementById('upd-detail').textContent = 'Aktuell: v' + r.local + ' → Neu: v' + r.remote;
      if (r.notes) { document.getElementById('upd-notes').style.display='block'; document.getElementById('upd-notes').textContent=r.notes; }
      document.getElementById('upd-do').style.display = 'block';
    } else {
      document.getElementById('upd-msg').textContent = '✅ App ist aktuell (v' + r.local + ')';
    }
  } catch(e) { document.getElementById('upd-msg').textContent = '⚠ ' + e.message; }
}

async function runUpdate() {
  document.getElementById('upd-do').style.display = 'none';
  document.getElementById('upd-prog').style.display = 'block';
  let p = 0;
  const iv = setInterval(() => { p=Math.min(p+8,85); document.getElementById('upd-bar').style.width=p+'%'; }, 400);
  try {
    const r = await api.doUpdate();
    clearInterval(iv);
    document.getElementById('upd-bar').style.width = '100%';
    if (r.success) {
      document.getElementById('upd-msg').textContent = '✅ Update installiert!';
      document.getElementById('upd-detail').textContent = 'CRM und Lieferschein wurden aktualisiert. Bitte Fenster schliessen und neu öffnen.';
      document.getElementById('upd-btn').classList.remove('has-upd');
      document.getElementById('upd-txt').textContent = 'Update prüfen';
      const v = await api.getVersion();
      document.getElementById('ver').textContent = 'v' + v;
    } else {
      document.getElementById('upd-msg').textContent = '⚠ ' + (r.error || 'Fehler');
    }
  } catch(e) {
    clearInterval(iv);
    document.getElementById('upd-msg').textContent = '⚠ ' + e.message;
  }
}

if (api) api.onTriggerUpdate(() => openUpdate());
init();
</script>
</body>
</html>
