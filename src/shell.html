*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:#1F3864}
#titlebar{height:52px;background:#1F3864;display:flex;align-items:center;padding:0 16px;gap:10px;

.app-logo{color:#C9A227;font-size:16px;font-weight:800;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}

.tabs{display:flex;gap:3px;background:rgba(255,255,255,.1);border-radius:8px;padding:3px;-webkit-app-region:no-drag;flex-shrink:0}
.tab-btn{padding:5px 14px;font-size:11px;font-weight:600;color:#93B5D5;cursor:pointer;border-radius:6px;border:none;background:none}
.tab-btn.active{background:#fff;color:#1F3864}
.tab-btn:hover:not(.active){color:#fff}
.sync-btn,.update-btn{padding:5px 10px;font-size:11px;font-weight:600;border-radius:7px;
  cursor:pointer;-webkit-app-region:no-drag;border:none;white-space:nowrap;flex-shrink:0}
.sync-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}
.sync-btn:hover{background:rgba(255,255,255,.22)}
.update-btn{background:#C9A227;color:#fff;margin-left:auto}
.update-btn:hover{background:#B8860B}
.update-btn.has-update{background:#166534;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}
.ver{color:#93B5D5;font-size:10px;-webkit-app-region:no-drag;flex-shrink:0}
#content{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:auto;background:#F0F4F8}
.tab-panel{display:none;min-height:100%}.tab-panel.active{display:block}
#upd-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center}
#upd-modal.open{display:flex}
.upd-card{background:#fff;border-radius:14px;width:460px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.upd-hdr{background:#1F3864;padding:14px 18px;display:flex;align-items:center;gap:10px}
.upd-hdr h3{color:#fff;font-size:14px}
.upd-body{padding:18px}
.upd-foot{padding:12px 18px;background:#F9FAFB;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #E5E7EB}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-ghost{background:#fff;color:#6B7280;border:1px solid #D1D5DB}
.btn-green{background:#166534;color:#fff}
.progress{width:100%;height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;margin:10px 0;display:none}
.progress-bar{height:100%;background:#166534;border-radius:4px;width:0%;transition:width .3s}
.upd-notes{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:10px;
  font-size:12px;color:#374151;margin-top:10px;white-space:pre-wrap;display:none}
.toast{position:fixed;bottom:20px;right:20px;background:#166534;color:#fff;font-size:12px;
  font-weight:600;padding:10px 16px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:99999;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

const api = window.electronAPI;
let currentTab = 'crm';
let tabLoaded = {crm: false, ls: false};

// ── Version ───────────────────────────────────────────────────────────────
async function importCRMData() {
  if (!api) { showToast('⚠ Nur in Desktop-App', '#B45309'); return; }
  const result = await api.showOpenDialog({
    title: 'CRM-Daten importieren',
    filters: [{ name: 'JSON / HTML', extensions: ['json','html'] }],
    properties: ['openFile']
  });
  if (result.canceled || !result.filePaths[0]) return;
  try {
    const content = await api.readFile(result.filePaths[0]);
    let contacts = null;
    
    // Try JSON first
    try {
      const parsed = JSON.parse(content);
      if (parsed.contacts) contacts = parsed.contacts;
      else if (Array.isArray(parsed)) contacts = parsed;
      else if (parsed.crm) contacts = parsed.crm;
    } catch(e) {}
    
    // Try extracting from HTML file (CRM HTML contains data as JS variable)
    if (!contacts || !contacts.length) {
      // Look for the contacts array in the HTML source
      const patterns = [
        /let contacts\s*=\s*(\[[\s\S]*?\]);/,
        /contacts\s*=\s*JSON\.parse\(['"](.*?)['"]\)/,
        /"hasli-crm-v3"\s*,\s*JSON\.stringify\((.*?)\)/,
      ];
      for (const pat of patterns) {
        const m = content.match(pat);
        if (m) {
          try { contacts = JSON.parse(m[1]); break; } catch(e) {}
        }
      }
    }
    
    // Try extracting JSON arrays from HTML  
    if (!contacts || !contacts.length) {
      const m = content.match(/\[{"id":"[a-z][\w]*".*?"lang":"[A-Z]{2}"}\]/);
      if (m) {
        try { contacts = JSON.parse(m[0]); } catch(e) {}
      }
    }

    if (!contacts || !contacts.length) {
      showToast('⚠ Keine Kontakte gefunden. Bitte JSON-Export verwenden.', '#DC2626');
      return;
    }
    
    localStorage.setItem('hasli-crm-v3', JSON.stringify(contacts));
    showToast('✅ ' + contacts.length + ' Kontakte importiert — CRM wird neu geladen…', '#166534');
    
    // Reload CRM tab
    tabLoaded.crm = false;
    document.querySelectorAll('style[data-tab="crm"]').forEach(s => s.remove());
    document.getElementById('panel-crm').innerHTML = '<div style="padding:40px;text-align:center;color:#93B5D5">Wird geladen…</div>';
    await loadTab('crm');
    switchTab('crm');
  } catch(e) {
    showToast('⚠ Fehler: ' + e.message, '#DC2626');
  }
}

async function initVersion() {
  if (api) {
    const v = await api.getVersion();
    document.getElementById('ver-badge').textContent = 'v' + v;
    document.title = 'Hasli Transport Roat v' + v;
    setTimeout(silentCheck, 3000);
  }
}

// ── Load tab content inline (no iframe) ──────────────────────────────────
async function loadTab(tab) {
  if (tabLoaded[tab]) return;
  const panel = document.getElementById('panel-' + tab);
  const file = (tab === 'crm') ? 'crm.html' : 'lieferschein.html';
  
  try {
    const resp = await fetch(file + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();

    // Extract body content
    const bodyRx = /<body[^>]*>([\s\S]*)<\/body>/i;
    const bodyM  = bodyRx.exec(html);
    const bodyContent = bodyM ? bodyM[1] : html;

    // Wrap in a shadow-like container with scoped ID
    panel.innerHTML = '<div id="app-' + tab + '" style="min-height:100%">' + bodyContent + '</div>';

    // Extract and scope CSS to prevent conflicts
    const styleRx = /<style[^>]*>([\s\S]*?)<\/style>/gi;
    let m;
    while ((m = styleRx.exec(html)) !== null) {
      const s = document.createElement('style');
      s.setAttribute('data-tab', tab);
      // Scope all styles to the container
      const scoped = m[1].replace(/(^|\})\s*([^@{}/][^{]*)\{/g, (match, before, selector) => {
        const trimmed = selector.trim();
        if (!trimmed || trimmed.startsWith('@') || trimmed.startsWith('from') || trimmed.startsWith('to')) return match;
        const scoped = trimmed.split(',').map(s => '#app-' + tab + ' ' + s.trim()).join(', ');
        return (before || '') + ' ' + scoped + ' {';
      });
      s.textContent = scoped;
      document.head.appendChild(s);
    }

    // Remove inline style tags from panel content
    panel.querySelectorAll('style').forEach(s => s.remove());

    // Re-run scripts
    const scripts = Array.from(panel.querySelectorAll('script'));
    for (const old of scripts) {
      const ns = document.createElement('script');
      if (old.src) ns.src = old.src;
      else ns.textContent = old.textContent;
      old.replaceWith(ns);
    }

    tabLoaded[tab] = true;
  } catch(e) {
    panel.innerHTML = '<div style="padding:40px;text-align:center;color:#DC2626">Fehler: ' + e.message + '</div>';
  }
}

// ── Tab switch ────────────────────────────────────────────────────────────
async function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (!tabLoaded[tab]) await loadTab(tab);
}

// ── SYNC — reads directly from shared localStorage (same window!) ─────────
function syncData() {
  // Because CRM runs in the SAME window (no iframe), its localStorage IS our localStorage
  const raw = localStorage.getItem('hasli-crm-v3') || localStorage.getItem('hasli-crm-v2');
  
  if (!raw) {
    if (!tabLoaded.crm) {
      showToast('⏳ CRM wird geladen…', '#1E40AF');
      loadTab('crm').then(() => setTimeout(syncData, 1000));
    } else {
      showToast('⚠ Keine CRM-Kontakte gefunden', '#B45309');
    }
    return;
  }

  let contacts;
  try { contacts = JSON.parse(raw); } catch(e) { showToast('⚠ Datenfehler', '#DC2626'); return; }
  if (!contacts.length) { showToast('⚠ CRM hat keine Kontakte', '#B45309'); return; }

  // Write sync key for LS to read
  localStorage.setItem('hasli-crm-contacts', raw);

  // If LS is loaded, notify it
  if (typeof buildAgList === 'function') buildAgList();

  showToast('✅ ' + contacts.length + ' Kontakte synchronisiert', '#166534');
  switchTab('ls');
}

// ── UPDATE ────────────────────────────────────────────────────────────────
async function silentCheck() {
  if (!api) return;
  try {
    const r = await api.checkUpdate();
    if (r.available) {
      const b = document.getElementById('upd-btn');
      b.textContent = '⬆ Update verfügbar!';
      b.classList.add('has-update');
    }
  } catch(e) {}
}

function openUpdate() {
  document.getElementById('upd-modal').classList.add('open');
  document.getElementById('upd-msg').textContent = 'Wird geprüft…';
  document.getElementById('upd-detail').textContent = '';
  document.getElementById('upd-notes').style.display = 'none';
  document.getElementById('upd-prog').style.display = 'none';
  document.getElementById('upd-do').style.display = 'none';
  checkUpdate();
}
function closeUpdate() { document.getElementById('upd-modal').classList.remove('open'); }

async function checkUpdate() {
  if (!api) { document.getElementById('upd-msg').textContent = '⚠ Nur in Desktop-App'; return; }
  try {
    const r = await api.checkUpdate();
    if (r.error) { document.getElementById('upd-msg').textContent = '⚠ ' + r.error; return; }
    if (r.available) {
      document.getElementById('upd-msg').textContent = '✅ Update verfügbar: v' + r.remote;
      document.getElementById('upd-detail').textContent = 'Aktuell: v' + r.local + ' → Neu: v' + r.remote;
      if (r.notes) {
        document.getElementById('upd-notes').style.display = 'block';
        document.getElementById('upd-notes').textContent = r.notes;
      }
      document.getElementById('upd-do').style.display = 'block';
    } else {
      document.getElementById('upd-msg').textContent = '✅ App ist aktuell (v' + r.local + ')';
    }
  } catch(e) { document.getElementById('upd-msg').textContent = '⚠ ' + e.message; }
}

async function doUpdate() {
  document.getElementById('upd-do').style.display = 'none';
  document.getElementById('upd-cancel').style.display = 'none';
  document.getElementById('upd-prog').style.display = 'block';
  let p = 0;
  const iv = setInterval(() => { p = Math.min(p+8, 85); document.getElementById('upd-bar').style.width = p + '%'; }, 400);
  try {
    const r = await api.doUpdate();
    clearInterval(iv);
    document.getElementById('upd-bar').style.width = '100%';
    if (r.success) {
      document.getElementById('upd-msg').textContent = '✅ Update installiert!';
      document.getElementById('upd-detail').textContent = 'App lädt die neuen Dateien…';
      setTimeout(() => {
        closeUpdate();
        // Reset tabs so they reload from new files
        tabLoaded = {crm: false, ls: false};
        document.querySelectorAll('style[data-tab]').forEach(s => s.remove());
        document.getElementById('panel-crm').innerHTML = '<div style="padding:40px;text-align:center;color:#93B5D5">Wird geladen…</div>';
        document.getElementById('panel-ls').innerHTML  = '<div style="padding:40px;text-align:center;color:#93B5D5">Wird geladen…</div>';
        loadTab(currentTab);
        api.getVersion().then(v => {
          document.getElementById('ver-badge').textContent = 'v' + v;
          document.getElementById('upd-btn').textContent = '🔄 Update prüfen';
          document.getElementById('upd-btn').classList.remove('has-update');
        });
      }, 1500);
    } else {
      document.getElementById('upd-msg').textContent = '⚠ ' + (r.error || 'Fehler');
      document.getElementById('upd-cancel').style.display = 'block';
    }
  } catch(e) {
    clearInterval(iv);
    document.getElementById('upd-msg').textContent = '⚠ ' + e.message;
    document.getElementById('upd-cancel').style.display = 'block';
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg || '#166534';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Menu events ───────────────────────────────────────────────────────────
if (api) {
  api.onSwitchTab(tab => switchTab(tab === 'lieferschein' ? 'ls' : tab));
  api.onTriggerUpdate(() => openUpdate());
}
